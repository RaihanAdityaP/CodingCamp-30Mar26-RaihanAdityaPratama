<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Toast notification container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Delete confirmation modal -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <p id="modal-title">Delete this transaction?</p>
      <p id="modal-subtitle" class="modal-subtitle"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Theme toggle -->
  <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>

  <div class="container">

    <!-- Total Balance -->
    <section class="balance-section">
      <h1>Expense &amp; Budget Visualizer</h1>
      <div class="balance-box">
        <span class="balance-label">Total Spending</span>
        <span id="total-balance">Rp 0</span>
      </div>
    </section>

    <!-- Input Form -->
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" placeholder="e.g. Lunch" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="amount">Amount (Rp)</label>
            <input type="number" id="amount" placeholder="e.g. 25000" min="0" step="1" />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="">-- Select --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Fun">🎮 Fun</option>
            </select>
          </div>
        </div>
        <p id="form-error" class="form-error hidden">Please fill in all fields correctly.</p>
        <button type="submit" class="btn-primary">+ Add Transaction</button>
      </form>

      <!-- Spending Limit -->
      <div class="limit-section">
        <label for="spending-limit">Spending Limit (Rp)</label>
        <div class="limit-row">
          <input type="number" id="spending-limit" placeholder="e.g. 500000" min="0" step="1" />
          <button id="set-limit-btn" class="btn-secondary">Set Limit</button>
        </div>
      </div>
    </section>

    <!-- Transaction List + Chart -->
    <section class="bottom-section">

      <!-- Transaction List -->
      <div class="list-panel">
        <div class="list-header">
          <h2>Transactions</h2>
          <div class="sort-controls">
            <label for="sort-select">Sort:</label>
            <select id="sort-select">
              <option value="default">Default</option>
              <option value="amount-asc">Amount ↑</option>
              <option value="amount-desc">Amount ↓</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" class="transaction-list"></ul>
      </div>

      <!-- Pie Chart -->
      <div class="chart-panel">
        <h2>Spending by Category</h2>
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      </div>

    </section>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
